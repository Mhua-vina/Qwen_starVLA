run_id: piper_dual_arm_adapter
run_root_dir: /mnt/data01/minghua/Qwen_starVLA/training_results
seed: 42
trackers: [jsonl, wandb]
wandb_entity: your-wandb-entity
wandb_project: piper_embodied_ai
is_debug: false

framework:
  name: QwenAdapter
  qwenvl:
    # 正大脑路径！
    base_vlm: /mnt/data01/minghua/Qwen_starVLA/weights/Qwen3-VL-4B-Instruct
    attn_implementation: sdpa
    vl_hidden_dim: 2560
  dino:
    dino_backbone: dinov2_vits14
  action_model:
    action_model_type: VLA-Adapter
    # 下载的 9.8G 小脑安上去！
    pretrained_checkpoint: /mnt/data01/minghua/Qwen_starVLA/weights/starvla_qwen_model/checkpoints/steps_40000_pytorch_model.pt
    hidden_dim: 2560
    # 最核心的跨越：7维单臂 -> 16维双臂！
    action_dim: 16
    state_dim: 16
    action_query_num: 64
    use_pro_version: true
    use_proprio: false
    phase: Training
    num_actions_chunk: 8
    future_action_window_size: 7
  reduce_in_full_precision: true

datasets:
  vla_data:
    dataset_py: lerobot_datasets
    #  指向刚刚用“切菜机”切好的数据集
    data_root_dir: /mnt/data01/minghua/Qwen_starVLA/starVLA/dataset/piper_lerobot_dataset
    data_mix: piper_dual_arm_expert
    action_type: absolute_qpos
    CoT_prompt: "Your task is {instruction}. To identify the key objects for your task. Locate their bounding boxes in [x1,y1,x2,y2] format."
    CoT_answer: bbox
    default_image_resolution: [3, 224, 224]
    # ✅ 修复点：填上了数字 4！
    per_device_batch_size: 4
    num_workers: 8          # 开启 8 个 CPU 核心同时预处理图片
    pin_memory: true        # 开启锁页内存，数据进入显卡的速度翻倍
    load_all_data_for_training: false
    # 匹配转换脚本里写的相机命名
    obs: ["main_camera"]
    video_backend: torchvision_av

trainer:
  epochs: 100
  max_train_steps: 10
  num_warmup_steps: 2
  save_interval: 10
  eval_interval: 100
  learning_rate:
    base: 2.0e-05
    qwen_vl_interface: 2.0e-05
    action_model: 1.0e-04
  lr_scheduler_type: constant
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  # 只冻结 VLM 大脑，action_model (Adapter) 必须训练！
  freeze_modules:
    - "qwen_vl_interface"
  loss_scale:
    vla: 1.0
    vlm: 1.0
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08

  save_format: pt
  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true